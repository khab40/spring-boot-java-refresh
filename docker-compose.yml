services:
  app:
    build: .
    container_name: market-data-lake-app
    ports:
      - "8080:8080"
    depends_on:
      - mailpit
      - airflow
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/h2/market-data-lake;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD:
      MARKETDATA_STUB_ENABLED: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_FRONTEND_ORIGIN: http://localhost:3000
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      APP_ADMIN_FIRST_NAME: ${APP_ADMIN_FIRST_NAME:-Admin}
      APP_ADMIN_LAST_NAME: ${APP_ADMIN_LAST_NAME:-User}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_USERNAME:
      SPRING_MAIL_PASSWORD:
      SPRING_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: "false"
      APP_MAIL_FROM: ${APP_MAIL_FROM:-noreply@marketdatalake.local}
      APP_AUTH_VERIFICATION_BASE_URL: ${APP_AUTH_VERIFICATION_BASE_URL:-http://localhost:8080/api/auth/verify-email}
      APP_AUTH_OAUTH2_SUCCESS_URL: ${APP_AUTH_OAUTH2_SUCCESS_URL:-http://localhost:3000/oauth/callback}
      APP_AUTH_OAUTH2_FAILURE_URL: ${APP_AUTH_OAUTH2_FAILURE_URL:-http://localhost:3000/?authError=google-signin-failed}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_SCOPES: ${GOOGLE_SCOPES:-openid,profile,email}
      APP_MONITORING_FRONTEND_HEALTH_URL: http://frontend:3000/api/health
      APP_MONITORING_AIRFLOW_HEALTH_URL: http://airflow:8080/api/v2/monitor/health
    volumes:
      - app_relational_data:/data/h2

  frontend:
    build: ./frontend
    container_name: market-data-lake-frontend
    ports:
      - "3000:3000"
    depends_on:
      - app

  mailpit:
    image: axllent/mailpit:v1.26
    container_name: market-data-lake-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  airflow:
    image: apache/airflow:slim-3.1.4
    container_name: market-data-lake-airflow
    command: standalone
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    volumes:
      - airflow_home:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: market-data-lake-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.6.0
    container_name: market-data-lake-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  app_relational_data:
  airflow_home:
  prometheus_data:
  grafana_data:
