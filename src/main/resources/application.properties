spring.application.name=market-data-lake

# Database - H2 for transactional local development and runtime
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:marketdata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# H2 Console for development
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# Server
server.port=${SERVER_PORT:8080}
app.frontend.origin=${APP_FRONTEND_ORIGIN:http://localhost:3000}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.first-name=${APP_ADMIN_FIRST_NAME:Admin}
app.admin.last-name=${APP_ADMIN_LAST_NAME:User}

# Stripe
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
security.jwt.secret=${SECURITY_JWT_SECRET:change-me-to-a-long-random-secret-key-for-jwt-signing}
security.jwt.expiration-hours=${SECURITY_JWT_EXPIRATION_HOURS:24}
app.auth.verification-base-url=${APP_AUTH_VERIFICATION_BASE_URL:http://localhost:8080/api/auth/verify-email}
app.auth.verification-expiration-hours=${APP_AUTH_VERIFICATION_EXPIRATION_HOURS:24}
app.auth.oauth2.success-url=${APP_AUTH_OAUTH2_SUCCESS_URL:http://localhost:3000/oauth/callback}
app.auth.oauth2.failure-url=${APP_AUTH_OAUTH2_FAILURE_URL:http://localhost:3000/?authError=google-signin-failed}
app.auth.google.client-id=${GOOGLE_CLIENT_ID:}
app.auth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.auth.google.scopes=${GOOGLE_SCOPES:openid,profile,email}
app.mail.from=${APP_MAIL_FROM:noreply@marketdatalake.local}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

# Market Data runtime
marketdata.stub.enabled=${MARKETDATA_STUB_ENABLED:true}
