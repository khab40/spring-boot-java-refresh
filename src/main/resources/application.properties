spring.application.name=spring-boot-java-refresh

# Database - H2 for local development (change to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:marketdata
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# Stripe
stripe.api-key=
stripe.webhook-secret=
security.jwt.secret=change-me-to-a-long-random-secret-key-for-jwt-signing
security.jwt.expiration-hours=24
