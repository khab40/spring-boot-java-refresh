spring.application.name=market-data-lake

# Database - H2 for transactional local development and runtime
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/h2/market-data-lake;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# H2 Console for development
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# Server
server.port=${SERVER_PORT:8080}
app.frontend.origin=${APP_FRONTEND_ORIGIN:http://localhost:3000}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.first-name=${APP_ADMIN_FIRST_NAME:Admin}
app.admin.last-name=${APP_ADMIN_LAST_NAME:User}

# Stripe
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
security.jwt.secret=${SECURITY_JWT_SECRET:change-me-to-a-long-random-secret-key-for-jwt-signing}
security.jwt.expiration-hours=${SECURITY_JWT_EXPIRATION_HOURS:24}
app.auth.verification-base-url=${APP_AUTH_VERIFICATION_BASE_URL:http://localhost:8080/api/auth/verify-email}
app.auth.verification-expiration-hours=${APP_AUTH_VERIFICATION_EXPIRATION_HOURS:24}
app.auth.oauth2.success-url=${APP_AUTH_OAUTH2_SUCCESS_URL:http://localhost:3000/oauth/callback}
app.auth.oauth2.failure-url=${APP_AUTH_OAUTH2_FAILURE_URL:http://localhost:3000/?authError=google-signin-failed}
app.auth.google.client-id=${GOOGLE_CLIENT_ID:}
app.auth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.auth.google.scopes=${GOOGLE_SCOPES:openid,profile,email}
app.auth.google.redirect-uri=${APP_AUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
app.mail.from=${APP_MAIL_FROM:noreply@marketdatalake.local}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

# Market Data runtime
marketdata.stub.enabled=${MARKETDATA_STUB_ENABLED:true}
app.fss.endpoint=${APP_FSS_ENDPOINT:http://localhost:9000}
app.fss.public-endpoint=${APP_FSS_PUBLIC_ENDPOINT:http://localhost:9000}
app.fss.region=${APP_FSS_REGION:us-east-1}
app.fss.access-key=${APP_FSS_ACCESS_KEY:marketdata}
app.fss.secret-key=${APP_FSS_SECRET_KEY:marketdata-secret}
app.fss.bucket=${APP_FSS_BUCKET:market-data-deliveries}
app.fss.signed-url-ttl-minutes=${APP_FSS_SIGNED_URL_TTL_MINUTES:1440}
app.otd.max-rows-per-file=${APP_OTD_MAX_ROWS_PER_FILE:1000}

# Monitoring
app.monitoring.frontend-health-url=${APP_MONITORING_FRONTEND_HEALTH_URL:http://frontend:3000/api/health}
app.monitoring.airflow-health-url=${APP_MONITORING_AIRFLOW_HEALTH_URL:http://airflow:8080/api/v2/monitor/health}
app.monitoring.external-timeout-ms=${APP_MONITORING_EXTERNAL_TIMEOUT_MS:2000}
management.endpoints.web.exposure.include=health,info,metrics,prometheus,mdl
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,ping,db,diskSpace,frontendUi,airflow,stripe,catalog,payments,usage,subscriptions,marketData
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.integrations.include=frontendUi,airflow,stripe
management.endpoint.health.group.business.include=catalog,payments,usage,subscriptions,marketData
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
