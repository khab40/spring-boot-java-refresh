spring.application.name=market-data-lake

# Database - H2 for transactional local development and runtime
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:marketdata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# H2 Console for development
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# Server
server.port=${SERVER_PORT:8080}

# Stripe
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
security.jwt.secret=${SECURITY_JWT_SECRET:change-me-to-a-long-random-secret-key-for-jwt-signing}
security.jwt.expiration-hours=${SECURITY_JWT_EXPIRATION_HOURS:24}

# Market Data Lake
marketdata.delta.path=${MARKETDATA_DELTA_PATH:${java.io.tmpdir}/mdl-delta/market_data}
