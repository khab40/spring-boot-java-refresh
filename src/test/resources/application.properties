# Test configuration using H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true

# Server port for tests
server.port=0

# Monitoring defaults for full-context tests
app.monitoring.frontend-health-url=http://frontend:3000/api/health
app.monitoring.airflow-health-url=http://airflow:8080/api/v2/monitor/health
app.monitoring.external-timeout-ms=200
management.endpoints.web.exposure.include=health,info,metrics,prometheus,mdl
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,ping,db,diskSpace,frontendUi,airflow,stripe,catalog,payments,usage,subscriptions,marketData
stripe.api-key=sk_test_monitoring_dummy
